name: Publish npm package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Setup npm
        run: npm install --global npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node -e 'const p = require("./package.json"); if (`v${p.version}` !== process.env.RELEASE_TAG) throw new Error(`release ${process.env.RELEASE_TAG} does not match package ${p.version}`)'

      - name: Publish
        run: npm publish --access public
